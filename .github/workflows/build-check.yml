name: Build Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    name: TypeScript Type Check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
        continue-on-error: true
      - name: Build client
        run: npm run build
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    name: Linting & Code Quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Check for obvious errors
        run: |
          echo "Checking for common TypeScript issues..."
          grep -r "TODO\|FIXME\|XXX" server/ client/ shared/ --include="*.ts" --include="*.tsx" || true

  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build Test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: nexus:test
